# Incident Postmortem Workflow
# Collects failed workflow run logs, correlates with PRs/commits, and drafts
# a postmortem via GitHub Models API using the incident-postmortem skill.
#
# Trigger manually with a failed run_id and environment.
#
# Prerequisites:
#   1. GH_PAT_TOKEN secret with scopes: repo, workflow
#   2. GitHub Models access enabled on the PAT account

name: Incident Postmortem

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: "Failed workflow run ID (numeric)"
        required: true
        type: string
      environment:
        description: "Environment where failure occurred"
        required: true
        type: choice
        options:
          - prod
          - rel
          - qa
      collect_logs:
        description: "Collect full run logs (may be large)"
        required: false
        type: boolean
        default: true
      model:
        description: "AI model for postmortem generation"
        required: false
        default: "openai/gpt-4o"
        type: choice
        options:
          - "openai/gpt-4o"
          - "openai/gpt-4o-mini"

permissions:
  contents: read
  issues: write
  actions: read

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Collect context from the failed run
  # ─────────────────────────────────────────────
  collect-context:
    name: Collect Run Context
    runs-on: ubuntu-latest
    outputs:
      run_status: ${{ steps.metadata.outputs.run_status }}
      run_conclusion: ${{ steps.metadata.outputs.run_conclusion }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch run metadata
        id: metadata
        env:
          GH_TOKEN: ${{ secrets.GH_PAT_TOKEN }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ inputs.run_id }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/incident

          echo "::group::Fetching run metadata for run $RUN_ID"
          RUN_META=$(gh run view "$RUN_ID" --repo "$REPO" --json \
            status,conclusion,name,headBranch,headSha,event,createdAt,updatedAt,jobs)

          echo "$RUN_META" > /tmp/incident/run_metadata.json
          echo "::endgroup::"

          # Extract key fields
          STATUS=$(echo "$RUN_META" | jq -r '.status')
          CONCLUSION=$(echo "$RUN_META" | jq -r '.conclusion')
          echo "run_status=$STATUS" >> "$GITHUB_OUTPUT"
          echo "run_conclusion=$CONCLUSION" >> "$GITHUB_OUTPUT"

          echo "Run status: $STATUS, conclusion: $CONCLUSION"

      - name: Fetch run logs
        if: inputs.collect_logs == true
        env:
          GH_TOKEN: ${{ secrets.GH_PAT_TOKEN }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ inputs.run_id }}
        run: |
          set -euo pipefail

          echo "::group::Fetching logs for run $RUN_ID"
          # Download logs (zip), extract failed job logs
          gh run view "$RUN_ID" --repo "$REPO" --log-failed > /tmp/incident/failed_logs.txt 2>/dev/null || \
            gh run view "$RUN_ID" --repo "$REPO" --log > /tmp/incident/full_logs.txt 2>/dev/null || \
            echo "Could not fetch logs" > /tmp/incident/failed_logs.txt

          # Truncate to 15000 chars to fit in LLM context
          if [ -f /tmp/incident/failed_logs.txt ]; then
            head -c 15000 /tmp/incident/failed_logs.txt > /tmp/incident/logs_truncated.txt
          elif [ -f /tmp/incident/full_logs.txt ]; then
            head -c 15000 /tmp/incident/full_logs.txt > /tmp/incident/logs_truncated.txt
          fi
          echo "::endgroup::"

          # Sanitize: remove potential secrets (tokens, keys)
          if [ -f /tmp/incident/logs_truncated.txt ]; then
            sed -i -E 's/(ghp_|gho_|github_pat_)[A-Za-z0-9_]+/[REDACTED_TOKEN]/g' /tmp/incident/logs_truncated.txt
            sed -i -E 's/(sk-|sk_live_|sk_test_)[A-Za-z0-9]+/[REDACTED_KEY]/g' /tmp/incident/logs_truncated.txt
            sed -i -E 's/Bearer [A-Za-z0-9._-]+/Bearer [REDACTED]/g' /tmp/incident/logs_truncated.txt
          fi

      - name: Correlate commits and PRs
        env:
          GH_TOKEN: ${{ secrets.GH_PAT_TOKEN }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ inputs.run_id }}
        run: |
          set -euo pipefail

          echo "::group::Correlating commits and PRs"

          # Get the head SHA from the run
          HEAD_SHA=$(jq -r '.headSha' /tmp/incident/run_metadata.json)
          HEAD_BRANCH=$(jq -r '.headBranch' /tmp/incident/run_metadata.json)

          # Find recent PRs merged to that branch
          RECENT_PRS=$(gh pr list --repo "$REPO" \
            --state merged \
            --base "$HEAD_BRANCH" \
            --limit 5 \
            --json number,title,author,mergedAt,headRefName 2>/dev/null || echo "[]")

          echo "$RECENT_PRS" > /tmp/incident/recent_prs.json

          # Get recent commits on that branch
          RECENT_COMMITS=$(gh api "/repos/${REPO}/commits?sha=${HEAD_SHA}&per_page=5" \
            --jq '[.[] | {sha: .sha[0:7], message: .commit.message[0:80], author: .commit.author.name, date: .commit.author.date}]' \
            2>/dev/null || echo "[]")

          echo "$RECENT_COMMITS" > /tmp/incident/recent_commits.json
          echo "::endgroup::"

      - name: Upload incident context
        uses: actions/upload-artifact@v4
        with:
          name: incident-context
          path: /tmp/incident/
          retention-days: 30

  # ─────────────────────────────────────────────
  # Job 2: Generate postmortem via AI
  # ─────────────────────────────────────────────
  generate-postmortem:
    name: Generate Postmortem
    runs-on: ubuntu-latest
    needs: [collect-context]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download incident context
        uses: actions/download-artifact@v4
        with:
          name: incident-context
          path: /tmp/incident/

      - name: Generate postmortem via AI
        env:
          GH_TOKEN: ${{ secrets.GH_PAT_TOKEN }}
          MODEL: ${{ inputs.model }}
          ENVIRONMENT: ${{ inputs.environment }}
          RUN_ID: ${{ inputs.run_id }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          # Load all context
          RUN_META=$(cat /tmp/incident/run_metadata.json)
          LOGS=""
          if [ -f /tmp/incident/logs_truncated.txt ]; then
            LOGS=$(cat /tmp/incident/logs_truncated.txt)
          fi
          RECENT_PRS=$(cat /tmp/incident/recent_prs.json 2>/dev/null || echo "[]")
          RECENT_COMMITS=$(cat /tmp/incident/recent_commits.json 2>/dev/null || echo "[]")

          # Load skill as system prompt
          SKILL_FILE=".github/incident-postmortem-skill.md"
          if [ -f "$SKILL_FILE" ]; then
            SYSTEM_PROMPT=$(cat "$SKILL_FILE")
          else
            SYSTEM_PROMPT="You are an SRE drafting an incident postmortem. Analyze the failed workflow run and produce a structured postmortem with timeline, root cause, and action items."
          fi

          # Load prompt template
          PROMPT_FILE=".github/incident-postmortem-prompt.md"
          if [ -f "$PROMPT_FILE" ]; then
            OUTPUT_TEMPLATE=$(cat "$PROMPT_FILE")
            OUTPUT_TEMPLATE="${OUTPUT_TEMPLATE//\{ENVIRONMENT\}/$ENVIRONMENT}"
          else
            OUTPUT_TEMPLATE="Generate a postmortem with: Title, Summary, Timeline, Impact, Root Cause, Correlated Changes, Remediation, Action Items, Lessons Learned."
          fi

          # Build user message
          USER_MSG="Draft an incident postmortem for this failed workflow run.

          ${OUTPUT_TEMPLATE}

          ---
          Environment: ${ENVIRONMENT}
          Run ID: ${RUN_ID}
          Repository: ${REPO}

          Run metadata:
          ${RUN_META}

          Failed job logs (truncated, sanitized):
          ${LOGS}

          Recent merged PRs:
          ${RECENT_PRS}

          Recent commits:
          ${RECENT_COMMITS}"

          # Call GitHub Models API
          PAYLOAD=$(jq -n \
            --arg model "$MODEL" \
            --arg system "$SYSTEM_PROMPT" \
            --arg user "$USER_MSG" \
            '{
              model: $model,
              messages: [
                {role: "system", content: $system},
                {role: "user", content: $user}
              ],
              max_tokens: 3000,
              temperature: 0.2
            }')

          RESPONSE=$(curl -sf https://models.github.ai/inference/chat/completions \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          POSTMORTEM=$(echo "$RESPONSE" | jq -r '.choices[0].message.content')
          printf '%s' "$POSTMORTEM" > /tmp/incident/postmortem-draft.md
          echo "Postmortem draft generated ($(wc -c < /tmp/incident/postmortem-draft.md) bytes)"

      - name: Upload postmortem draft
        uses: actions/upload-artifact@v4
        with:
          name: postmortem-draft
          path: /tmp/incident/postmortem-draft.md
          retention-days: 30

  # ─────────────────────────────────────────────
  # Job 3: Publish draft as GitHub Issue
  # ─────────────────────────────────────────────
  publish-draft:
    name: Publish Draft Issue
    runs-on: ubuntu-latest
    needs: [generate-postmortem]
    steps:
      - name: Download postmortem draft
        uses: actions/download-artifact@v4
        with:
          name: postmortem-draft
          path: /tmp/incident/

      - name: Create GitHub Issue
        env:
          GH_TOKEN: ${{ secrets.GH_PAT_TOKEN }}
          REPO: ${{ github.repository }}
          ENVIRONMENT: ${{ inputs.environment }}
          RUN_ID: ${{ inputs.run_id }}
        run: |
          set -euo pipefail

          POSTMORTEM=$(cat /tmp/incident/postmortem-draft.md)
          DATE=$(date -u +"%Y-%m-%d")

          TITLE="📋 Postmortem Draft: ${ENVIRONMENT} failure — Run ${RUN_ID} (${DATE})"

          BODY="## Incident Postmortem Draft

          > ⚠️ This is an AI-generated draft. Please review, verify facts, assign owners, and edit before publishing.

          **Workflow Run:** [${{ inputs.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ inputs.run_id }})
          **Environment:** \`${ENVIRONMENT}\`
          **Generated:** ${DATE}

          ---

          ${POSTMORTEM}

          ---

          ### Next Steps
          - [ ] Verify timeline accuracy
          - [ ] Confirm root cause analysis
          - [ ] Assign action item owners
          - [ ] Review with team before publishing
          "

          gh issue create \
            --repo "$REPO" \
            --title "$TITLE" \
            --body "$BODY" \
            --label "postmortem,incident,${ENVIRONMENT}"

          echo "✅ Postmortem draft issue created"
