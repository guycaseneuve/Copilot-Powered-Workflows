# Security Autofix Pipeline
# Runs CodeQL SAST + Dependabot SCA, aggregates findings via AI, auto-fixes where possible,
# and notifies via GitHub Issue + optional Slack.
#
# Prerequisites:
#   1. GH_PAT_TOKEN secret with scopes: repo, workflow, security_events
#   2. SLACK_WEBHOOK_URL secret (optional — for Slack alerts)
#   3. GitHub Models access enabled on the PAT account

name: Security Autofix

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"  # Weekly Monday 6am UTC
  workflow_dispatch:
    inputs:
      model:
        description: "AI model for report generation"
        required: false
        default: "openai/gpt-4o-mini"
        type: choice
        options:
          - "openai/gpt-4o-mini"
          - "openai/gpt-4o"

permissions:
  contents: write
  pull-requests: write
  security-events: write
  issues: write

jobs:
  # ─────────────────────────────────────────────
  # Job 1: CodeQL SAST scan
  # ─────────────────────────────────────────────
  codeql:
    name: CodeQL SAST
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript
          source-root: demo-app

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          output: results
          upload: always

      - name: Upload SARIF as artifact
        uses: actions/upload-artifact@v4
        with:
          name: codeql-sarif
          path: results/*.sarif
          retention-days: 7

  # ─────────────────────────────────────────────
  # Job 2: Dependabot / Dependency scan
  # ─────────────────────────────────────────────
  dependabot-scan:
    name: Dependency Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch Dependabot alerts
        env:
          GH_TOKEN: ${{ secrets.GH_PAT_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          mkdir -p results

          echo "Fetching Dependabot alerts for $REPO..."
          ALERTS=$(gh api "/repos/${REPO}/dependabot/alerts" \
            --jq '[.[] | select(.state == "open")]' \
            2>/dev/null || echo "[]")

          echo "$ALERTS" > results/dependabot.json

          COUNT=$(echo "$ALERTS" | jq 'length')
          echo "Found $COUNT open Dependabot alerts"

      - name: Upload Dependabot results
        uses: actions/upload-artifact@v4
        with:
          name: dependabot-json
          path: results/dependabot.json
          retention-days: 7

  # ─────────────────────────────────────────────
  # Job 3: Aggregate findings + AI report
  # ─────────────────────────────────────────────
  aggregate:
    name: Aggregate & AI Report
    runs-on: ubuntu-latest
    needs: [codeql, dependabot-scan]
    outputs:
      has_critical: ${{ steps.analyze.outputs.has_critical }}
      has_findings: ${{ steps.analyze.outputs.has_findings }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download CodeQL SARIF
        uses: actions/download-artifact@v4
        with:
          name: codeql-sarif
          path: results/

      - name: Download Dependabot JSON
        uses: actions/download-artifact@v4
        with:
          name: dependabot-json
          path: results/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run aggregate script
        id: analyze
        run: |
          set -euo pipefail

          # Find the SARIF file (CodeQL names it dynamically)
          SARIF_FILE=$(find results -name "*.sarif" -type f | head -1)
          DEPENDABOT_FILE="results/dependabot.json"

          SARIF_ARG=""
          if [ -n "$SARIF_FILE" ]; then
            SARIF_ARG="--sarif $SARIF_FILE"
          fi

          DEP_ARG=""
          if [ -f "$DEPENDABOT_FILE" ]; then
            DEP_ARG="--dependabot $DEPENDABOT_FILE"
          fi

          python scripts/aggregate_findings.py \
            $SARIF_ARG \
            $DEP_ARG \
            --output results/aggregated-findings.json

          # Set outputs for downstream jobs
          TOTAL=$(jq '.summary.total' results/aggregated-findings.json)
          CRITICAL=$(jq '.summary.critical' results/aggregated-findings.json)

          echo "has_findings=$( [ "$TOTAL" -gt 0 ] && echo true || echo false )" >> "$GITHUB_OUTPUT"
          echo "has_critical=$( [ "$CRITICAL" -gt 0 ] && echo true || echo false )" >> "$GITHUB_OUTPUT"

      - name: Generate AI security report
        if: steps.analyze.outputs.has_findings == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT_TOKEN }}
          MODEL: ${{ inputs.model || 'openai/gpt-4o-mini' }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          FINDINGS=$(cat results/aggregated-findings.json)
          SCAN_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # Load skill as system prompt
          SKILL_FILE=".github/security-autofix-skill.md"
          if [ -f "$SKILL_FILE" ]; then
            SYSTEM_PROMPT=$(cat "$SKILL_FILE")
          else
            SYSTEM_PROMPT="You are a senior security engineer. Analyze the scan findings and produce a prioritized security report."
          fi

          # Load prompt template
          PROMPT_FILE=".github/security-autofix-prompt.md"
          if [ -f "$PROMPT_FILE" ]; then
            OUTPUT_TEMPLATE=$(cat "$PROMPT_FILE")
            OUTPUT_TEMPLATE="${OUTPUT_TEMPLATE//\{REPO\}/$REPO}"
            OUTPUT_TEMPLATE="${OUTPUT_TEMPLATE//\{SCAN_DATE\}/$SCAN_DATE}"
          else
            OUTPUT_TEMPLATE="Generate a security report with: Executive Summary, Findings by Severity, Remediation Priority, Auto-fix Summary."
          fi

          # Build user message
          USER_MSG="Analyze these security scan findings and generate a report.

          ${OUTPUT_TEMPLATE}

          Aggregated findings:
          ${FINDINGS}"

          # Call GitHub Models API
          PAYLOAD=$(jq -n \
            --arg model "$MODEL" \
            --arg system "$SYSTEM_PROMPT" \
            --arg user "$USER_MSG" \
            '{
              model: $model,
              messages: [
                {role: "system", content: $system},
                {role: "user", content: $user}
              ],
              max_tokens: 3000,
              temperature: 0.2
            }')

          RESPONSE=$(curl -sf https://models.github.ai/inference/chat/completions \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          REPORT=$(echo "$RESPONSE" | jq -r '.choices[0].message.content')
          printf '%s' "$REPORT" > results/security-report.md
          echo "Security report generated ($(wc -c < results/security-report.md) bytes)"

      - name: Upload aggregated results
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: |
            results/aggregated-findings.json
            results/security-report.md
          retention-days: 30

  # ─────────────────────────────────────────────
  # Job 4: Auto-fix and open PR
  # ─────────────────────────────────────────────
  autofix:
    name: Auto-fix & PR
    runs-on: ubuntu-latest
    needs: [aggregate]
    if: needs.aggregate.outputs.has_findings == 'true' && github.event_name != 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Download security report
        uses: actions/download-artifact@v4
        with:
          name: security-report
          path: results/

      - name: Run npm audit fix
        working-directory: demo-app
        run: |
          set -euo pipefail
          echo "Installing dependencies..."
          npm install --ignore-scripts 2>/dev/null || true

          echo "Running npm audit fix..."
          npm audit fix --force 2>&1 | tee /tmp/audit-fix-output.txt || true

          echo "npm audit fix complete"

      - name: Run ESLint fix
        working-directory: demo-app
        run: |
          set -euo pipefail
          echo "Running eslint --fix..."
          npx eslint . --fix 2>&1 | tee /tmp/eslint-fix-output.txt || true
          echo "eslint --fix complete"

      - name: Create fix branch and PR
        env:
          GH_TOKEN: ${{ secrets.GH_PAT_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          BRANCH="security/autofix-${{ github.run_id }}"

          # Check if there are any changes
          if git diff --quiet && git diff --cached --quiet; then
            echo "No auto-fixable changes detected. Skipping PR creation."
            exit 0
          fi

          # Configure git
          git config user.name "security-autofix[bot]"
          git config user.email "security-autofix[bot]@users.noreply.github.com"

          # Create branch and commit
          git checkout -b "$BRANCH"
          git add -A
          git commit -m "security: auto-fix vulnerabilities from scan run ${{ github.run_id }}

          Applied:
          - npm audit fix (dependency upgrades)
          - eslint --fix (code style corrections)

          See security report for full details."

          git push origin "$BRANCH"

          # Build PR body from security report
          PR_BODY="## Security Auto-fix

          This PR was automatically generated by the security-autofix pipeline.

          **Run:** [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

          ### Changes Applied
          - \`npm audit fix\` — upgraded vulnerable dependencies
          - \`eslint --fix\` — corrected code style issues

          ---
          "

          if [ -f results/security-report.md ]; then
            PR_BODY="${PR_BODY}
          $(cat results/security-report.md)"
          fi

          gh pr create \
            --repo "$REPO" \
            --base main \
            --head "$BRANCH" \
            --title "security: auto-fix vulnerabilities (run ${{ github.run_id }})" \
            --body "$PR_BODY" \
            --label "security,automated"

          echo "✅ Auto-fix PR created"

  # ─────────────────────────────────────────────
  # Job 5: Notify (Issue + Slack)
  # ─────────────────────────────────────────────
  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [aggregate]
    if: needs.aggregate.outputs.has_critical == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download security report
        uses: actions/download-artifact@v4
        with:
          name: security-report
          path: results/

      - name: Create GitHub Issue
        env:
          GH_TOKEN: ${{ secrets.GH_PAT_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          SCAN_DATE=$(date -u +"%Y-%m-%d")
          TITLE="🔒 Security: Critical findings detected — ${SCAN_DATE}"

          BODY="## Security Scan Alert

          **Critical vulnerabilities detected** in the latest security scan.

          **Workflow Run:** [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          **Triggered by:** ${{ github.event_name }}
          **Branch:** ${{ github.ref_name }}

          ---
          "

          if [ -f results/security-report.md ]; then
            BODY="${BODY}
          $(cat results/security-report.md)"
          fi

          gh issue create \
            --repo "$REPO" \
            --title "$TITLE" \
            --body "$BODY" \
            --label "security,critical"

          echo "✅ Security issue created"

      - name: Slack notification
        if: env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          SCAN_DATE=$(date -u +"%Y-%m-%d")
          SUMMARY=$(jq -r '.summary | "Total: \(.total) | Critical: \(.critical) | High: \(.high) | Medium: \(.medium)"' results/aggregated-findings.json)

          PAYLOAD=$(jq -n \
            --arg repo "$REPO" \
            --arg date "$SCAN_DATE" \
            --arg summary "$SUMMARY" \
            --arg url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            '{
              text: "🔒 Security Alert: \($repo)",
              blocks: [
                {
                  type: "section",
                  text: {
                    type: "mrkdwn",
                    text: "*🔒 Security Scan Alert*\n*Repo:* \($repo)\n*Date:* \($date)\n*Findings:* \($summary)"
                  }
                },
                {
                  type: "actions",
                  elements: [
                    {
                      type: "button",
                      text: { type: "plain_text", text: "View Run" },
                      url: $url
                    }
                  ]
                }
              ]
            }')

          curl -sf -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"

          echo "✅ Slack notification sent"
