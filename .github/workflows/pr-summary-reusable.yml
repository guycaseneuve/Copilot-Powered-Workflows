# Reusable workflow: Generate AI PR Summary
# Other repos call this workflow to auto-summarize pull requests.
#
# Usage in any repo:
#   jobs:
#     summarize:
#       uses: YOUR_ORG/YOUR_SHARED_REPO/.github/workflows/pr-summary-reusable.yml@main
#       with:
#         pr_number: ${{ github.event.pull_request.number }}
#         repo: ${{ github.repository }}
#       secrets:
#         token: ${{ secrets.GH_PAT_TOKEN }}
#         ai_endpoint: ${{ secrets.AI_ENDPOINT }}
#         ai_api_key: ${{ secrets.AI_API_KEY }}

name: Reusable PR Summary

on:
  workflow_call:
    inputs:
      pr_number:
        description: "Pull request number"
        required: true
        type: number
      repo:
        description: "owner/repo"
        required: true
        type: string
      model:
        description: "AI model ID (e.g. openai/gpt-4o-mini)"
        required: false
        type: string
        default: "openai/gpt-4o-mini"
      max_diff_chars:
        description: "Max characters of diff to send to the model"
        required: false
        type: number
        default: 12000
      ai_provider:
        description: "AI provider: 'github-models' or 'azure-openai'"
        required: false
        type: string
        default: "github-models"
    secrets:
      token:
        description: "GitHub PAT with repo scope (and models:read for GitHub Models)"
        required: true
      ai_endpoint:
        description: "AI API endpoint URL (only needed for azure-openai)"
        required: false
      ai_api_key:
        description: "AI API key (only needed for azure-openai; GitHub Models uses the PAT)"
        required: false

jobs:
  generate-summary:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gather PR context
        id: context
        env:
          GH_TOKEN: ${{ secrets.token }}
          PR_NUMBER: ${{ inputs.pr_number }}
          REPO: ${{ inputs.repo }}
          MAX_CHARS: ${{ inputs.max_diff_chars }}
        run: |
          set -euo pipefail

          echo "::group::Fetching PR metadata"
          PR_TITLE=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json title --jq '.title')
          PR_BODY=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json body --jq '.body')
          echo "::endgroup::"

          # Skip if summary already exists
          if echo "$PR_BODY" | grep -q '## AI-Generated Summary'; then
            echo "Summary already exists. Skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"

          echo "::group::Fetching changed files and commits"
          FILES=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json files --jq '[.files[].path] | join("\n")')
          COMMITS=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json commits --jq '[.commits[].messageHeadline] | join("\n")')
          echo "::endgroup::"

          echo "::group::Fetching diff (truncated to $MAX_CHARS chars)"
          DIFF=$(gh pr diff "$PR_NUMBER" --repo "$REPO" | head -c "$MAX_CHARS")
          echo "::endgroup::"

          # Write context to files (avoids shell escaping issues)
          echo "$PR_TITLE" > /tmp/pr_title.txt
          echo "$PR_BODY" > /tmp/pr_body.txt
          echo "$FILES" > /tmp/pr_files.txt
          echo "$COMMITS" > /tmp/pr_commits.txt
          echo "$DIFF" > /tmp/pr_diff.txt

      - name: Generate summary via GitHub Models
        if: steps.context.outputs.skip != 'true' && inputs.ai_provider == 'github-models'
        id: summary-github
        env:
          GH_TOKEN: ${{ secrets.token }}
          MODEL: ${{ inputs.model }}
        run: |
          set -euo pipefail

          PR_TITLE=$(cat /tmp/pr_title.txt)
          FILES=$(cat /tmp/pr_files.txt)
          COMMITS=$(cat /tmp/pr_commits.txt)
          DIFF=$(cat /tmp/pr_diff.txt)

          PROMPT="You are a senior developer reviewing a pull request. Generate a concise PR summary in markdown.

          PR Title: ${PR_TITLE}

          Changed files:
          ${FILES}

          Commit messages:
          ${COMMITS}

          Diff (may be truncated):
          ${DIFF}

          Provide:
          1. **Overview** — one paragraph explaining what this PR does and why
          2. **Key Changes** — bullet list of the most important changes
          3. **Files Modified** — grouped by area/purpose
          4. **Risk/Notes** — anything reviewers should pay attention to"

          # Build JSON payload safely with jq
          PAYLOAD=$(jq -n \
            --arg model "$MODEL" \
            --arg prompt "$PROMPT" \
            '{
              model: $model,
              messages: [{role: "user", content: $prompt}],
              max_tokens: 1024,
              temperature: 0.3
            }')

          RESPONSE=$(curl -sf https://models.github.ai/inference/chat/completions \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          SUMMARY=$(echo "$RESPONSE" | jq -r '.choices[0].message.content')
          echo "$SUMMARY" > /tmp/pr_summary.txt

      - name: Generate summary via Azure OpenAI
        if: steps.context.outputs.skip != 'true' && inputs.ai_provider == 'azure-openai'
        id: summary-azure
        env:
          AI_ENDPOINT: ${{ secrets.ai_endpoint }}
          AI_API_KEY: ${{ secrets.ai_api_key }}
          MODEL: ${{ inputs.model }}
        run: |
          set -euo pipefail

          PR_TITLE=$(cat /tmp/pr_title.txt)
          FILES=$(cat /tmp/pr_files.txt)
          COMMITS=$(cat /tmp/pr_commits.txt)
          DIFF=$(cat /tmp/pr_diff.txt)

          PROMPT="You are a senior developer reviewing a pull request. Generate a concise PR summary in markdown.

          PR Title: ${PR_TITLE}

          Changed files:
          ${FILES}

          Commit messages:
          ${COMMITS}

          Diff (may be truncated):
          ${DIFF}

          Provide:
          1. **Overview** — one paragraph explaining what this PR does and why
          2. **Key Changes** — bullet list of the most important changes
          3. **Files Modified** — grouped by area/purpose
          4. **Risk/Notes** — anything reviewers should pay attention to"

          PAYLOAD=$(jq -n \
            --arg model "$MODEL" \
            --arg prompt "$PROMPT" \
            '{
              model: $model,
              messages: [{role: "user", content: $prompt}],
              max_tokens: 1024,
              temperature: 0.3
            }')

          RESPONSE=$(curl -sf "${AI_ENDPOINT}" \
            -H "api-key: ${AI_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          SUMMARY=$(echo "$RESPONSE" | jq -r '.choices[0].message.content')
          echo "$SUMMARY" > /tmp/pr_summary.txt

      - name: Update PR body with summary
        if: steps.context.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.token }}
          PR_NUMBER: ${{ inputs.pr_number }}
          REPO: ${{ inputs.repo }}
        run: |
          set -euo pipefail

          SUMMARY=$(cat /tmp/pr_summary.txt)
          EXISTING_BODY=$(cat /tmp/pr_body.txt)

          NEW_BODY="${EXISTING_BODY}

          ---
          ## AI-Generated Summary
          ${SUMMARY}
          "

          gh pr edit "$PR_NUMBER" --repo "$REPO" --body "$NEW_BODY"
          echo "✅ PR summary added to PR #${PR_NUMBER}"
